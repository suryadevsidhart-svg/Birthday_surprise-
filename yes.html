<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Happy birthday! 🥳</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container yes-container">
       <h1>
  <span class="gradient-text">Happy birthday to you</span> 🎉 🎊
       </h1> 
        <div class="gif-container">
            <img id="cat-gif" src="Birthday.gif" alt="celebrating">
        </div>

        <p class="yes-message">many many happy returns of the day 🎊 </p>
    </div>

    <audio id="bg-music" loop>
        <source src="birthday.mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

 
    <script src="yes-script.js"></script>

    <script>
const card = document.querySelector('.container');

document.addEventListener('mousemove', (e) => {
    const rect = card.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    const rotateX = -(y - centerY) / 20;
    const rotateY = (x - centerX) / 20;

    card.style.transform =
        `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});
    </script>
    
</body>
</html>

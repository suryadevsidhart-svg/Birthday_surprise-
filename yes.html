<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Happy birthday! 🥳</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container yes-container">
        <h1 class="yes-title">
  <span class="gradient-text">Happy birthday to you</span> 🎉 🎊
        </h1>
        
        <div class="gif-container">
            <img id="cat-gif" src="Birthday.gif" alt="celebrating">
        </div>

        <p class="yes-message">many many happy returns of the day 🎊 </p>
    </div>

    <audio id="bg-music" loop>
        <source src="birthday.mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

 
    <script src="yes-script.js"></script>


    <script>
const heartsContainer = document.querySelector('.hearts-bg');

function createHeart() {
    const heart = document.createElement('span');
    
    const emojis = ['💖','🎉','✨','🎂','💝','🎊'];
    heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];

    // random horizontal position
    heart.style.left = Math.random() * 100 + 'vw';

    // random size
    heart.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';

    // random duration
    heart.style.animationDuration = (Math.random() * 6 + 8) + 's';

    // random delay
    heart.style.animationDelay = Math.random() * 5 + 's';

    heartsContainer.appendChild(heart);

    // remove after animation ends (cleanup)
    setTimeout(() => {
        heart.remove();
    }, 15000);
}

// spawn continuously
setInterval(createHeart, 500);
    </script>
    
</body>
</html>
